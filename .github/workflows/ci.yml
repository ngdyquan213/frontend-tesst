name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint

      - name: Run integration tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run mock E2E suite
        run: npm run test:e2e

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==25.2
          pip install -r requirements-dev.lock
          pip install --no-deps -e .

      - name: Run Ruff
        run: ruff check app tests scripts

      - name: Run backend tests
        run: pytest -q

      - name: Run Bandit
        run: bandit -q -r app

  stack-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend stack
        run: docker compose up -d --build postgres redis backend

      - name: Smoke backend deployment
        run: python backend/scripts/smoke_local_stack.py --base-url http://127.0.0.1:8000 --expected-environment development

      - name: Seed deterministic live E2E data
        run: docker compose exec -T backend python -m scripts.seed_demo_environment

      - name: Start frontend container
        run: docker compose up -d --build frontend

      - name: Verify frontend shell
        run: |
          curl --fail --retry 20 --retry-connrefused --retry-delay 3 http://127.0.0.1:8080 >/tmp/frontend.html
          grep -qi "travelbook" /tmp/frontend.html
          curl --fail --silent --show-error --head http://127.0.0.1:8080 | grep -qi "content-security-policy"

      - name: Install frontend dependencies for live browser smoke
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run live E2E suite against the backend stack
        run: VITE_API_PROXY_TARGET=http://127.0.0.1:8000 npm --prefix frontend run test:e2e:live

      - name: Run lightweight API load smoke against the backend stack
        run: docker compose exec -T backend python -m scripts.load_smoke --base-url http://127.0.0.1:8000/api/v1

      - name: Print docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
