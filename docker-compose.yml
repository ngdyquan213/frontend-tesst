services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-TravelBook}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/mock-api}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
        VITE_DEFAULT_THEME: ${VITE_DEFAULT_THEME:-light}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
